services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mosquitto
    volumes:
      - sensor-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DATA_DIR=/data
      # The MQTT topic browser (a server action) connects to the broker on demand.
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_USERNAME=${MQTT_USERNAME:-sensify}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-sensify}
    restart: unless-stopped

  poller:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "poller"]
    volumes:
      - sensor-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

  # MQTT broker. Config + password file are generated inline from the env vars
  # below so this stays self-contained (no extra files to ship). allow_anonymous
  # is off; plaintext (no TLS) is a deliberate accepted risk on a LAN-only,
  # VPN-gated network — see the README. Port 1883 is published so LAN devices
  # (Shelly, ESP32 nodes) can reach it; do not forward it past the LAN.
  mosquitto:
    image: eclipse-mosquitto:2
    command:
      - sh
      - -c
      - |
        set -e
        # -c refuses to overwrite an existing file, and `restart: unless-stopped`
        # restarts *this* container (so /mosquitto/config survives). Without the
        # rm, any single failed start wedges the container in an unrecoverable
        # restart loop.
        rm -f /mosquitto/config/passwordfile
        mosquitto_passwd -b -c /mosquitto/config/passwordfile "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        chown mosquitto:mosquitto /mosquitto/config/passwordfile 2>/dev/null || true
        chmod 0700 /mosquitto/config/passwordfile 2>/dev/null || true
        # One echo per directive: whether printf interprets \n escapes varies by
        # shell, and getting it wrong silently produces a single-line config.
        {
          echo "listener 1883"
          echo "allow_anonymous false"
          echo "password_file /mosquitto/config/passwordfile"
          echo "persistence true"
          echo "persistence_location /mosquitto/data/"
        } > /mosquitto/config/mosquitto.conf
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME:-sensify}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-sensify}
    volumes:
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

  # Third ingest transport, peer to web (push) and poller (pull). Same image,
  # different command — mirrors the poller. Phase 1 only connects and logs.
  mqtt-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "ingest"]
    depends_on:
      - mosquitto
    volumes:
      - sensor-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DATA_DIR=/data
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_USERNAME=${MQTT_USERNAME:-sensify}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-sensify}
    restart: unless-stopped

volumes:
  sensor-data:
  mosquitto-data:
